<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/user-profile.css}">
    <title>CookBook - My Profile</title>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" style="color:green;" th:href="@{/}">CookBook</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/about}">About us</a></li>
                </ul>
                <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>
</header>
<hr>

<div class="container mt-4">
    <h1 class="text-center">Welcome, <span th:text="${currentUser.username}">User</span>!</h1>

    <!-- Add Recipe Form -->
    <section class="mt-4">
        <h3>Add New Recipe</h3>
        <form th:action="@{/api/recipe/add}" method="post" id="add-recipe-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" name="title" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Description</label>
                    <input type="text" class="form-control" name="description" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Add</button>
                </div>
            </div>
        </form>
    </section>

    <!-- My Recipes -->
    <section id="my-recipes" class="mt-5">
        <h2>My Recipes</h2>
        <div class="row">
            <div class="col-md-4 mb-4" th:each="recipe : ${recipes}">
                <div class="card recipe-card h-100">
                    <img th:src="${'/images/' + recipe.imageUrl}"
                         th:alt="${recipe.name}" class="card-img-top"
                         style="height:160px;object-fit:cover;"
                         onerror="this.src='/images/grey.jpg'">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${recipe.name}">Name</h5>
                        <p class="card-text flex-grow-1" th:text="${recipe.description}">Desc</p>
                        <div class="d-flex gap-2 mt-2">
                            <a class="btn btn-primary btn-sm"
                               th:href="@{/recipe/{id}(id=${recipe.id})}">View</a>
                            <a class="btn btn-warning btn-sm"
                               th:href="@{/edit-recipe/{id}(id=${recipe.id})}">Edit</a>
                            <button class="btn btn-danger btn-sm delete-btn"
                                    th:data-recipe-id="${recipe.id}">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(recipes)}" class="col-12">
                <p class="text-muted">You haven't added any recipes yet.</p>
            </div>
        </div>
    </section>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/userProfile.js}"></script>
</body>
</html>
