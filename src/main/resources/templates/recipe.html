<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/recipe.css}">
    <title>CookBook - <span th:text="${recipe.name}">Recipe</span></title>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" style="color:green;" th:href="@{/}">CookBook</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/about}">About us</a></li>
                </ul>
                <sec:authorize access="isAuthenticated()">
                    <a class="btn btn-outline-secondary me-2" th:href="@{/user-profile}">My Profile</a>
                    <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
                </sec:authorize>
                <sec:authorize access="!isAuthenticated()">
                    <a class="btn btn-primary me-1" th:href="@{/login}">Sign In</a>
                    <a class="btn btn-secondary" th:href="@{/register}">Sign Up</a>
                </sec:authorize>
            </div>
        </div>
    </nav>
</header>
<hr>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <img th:src="${recipe.imageUrl != null ? '/images/' + recipe.imageUrl : '/images/grey.jpg'}"
                 th:alt="${recipe.name}" class="img-fluid rounded shadow"
                 onerror="this.src='/images/grey.jpg'">
        </div>
        <div class="col-md-6">
            <h1 th:text="${recipe.name}">Recipe Name</h1>
            <p class="text-muted">
                By <a th:href="@{/profile/{id}(id=${recipe.author?.id})}"
                      th:text="${recipe.author?.username}">Author</a>
            </p>
            <p th:text="${recipe.description}">Description</p>

            <!-- Favourite button -->
            <sec:authorize access="isAuthenticated()">
                <button id="fav-btn"
                        class="btn"
                        th:classappend="${isFavourite} ? 'btn-warning' : 'btn-outline-warning'"
                        th:data-recipe-id="${recipe.id}"
                        th:data-is-fav="${isFavourite}">
                    <span th:text="${isFavourite} ? '★ Favourited' : '☆ Add to Favourites'">☆ Favourite</span>
                </button>
            </sec:authorize>

            <!-- Edit / Delete (owner or admin) -->
            <div th:if="${currentUser != null and (currentUser.id == recipe.author?.id or currentUser.admin)}"
                 class="mt-3 d-flex gap-2">
                <a class="btn btn-warning" th:href="@{/edit-recipe/{id}(id=${recipe.id})}">Edit</a>
                <button class="btn btn-danger" id="delete-btn"
                        th:data-recipe-id="${recipe.id}">Delete</button>
            </div>
        </div>
    </div>

    <hr>

    <div class="row mt-3" th:if="${recipe.ingredients != null and !recipe.ingredients.isBlank()}">
        <div class="col-md-6">
            <h3>Ingredients</h3>
            <p th:text="${recipe.ingredients}">Ingredients</p>
        </div>
    </div>

    <div class="row mt-3" th:if="${recipe.steps != null and !recipe.steps.isBlank()}">
        <div class="col-12">
            <h3>Instructions</h3>
            <p th:text="${recipe.steps}">Steps</p>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/receipPage.js}"></script>
</body>
</html>
