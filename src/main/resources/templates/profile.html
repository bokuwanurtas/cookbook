<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/user-profile.css}">
    <title>CookBook - Profile</title>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" style="color:green;" th:href="@{/}">CookBook</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/about}">About us</a></li>
                </ul>
                <sec:authorize access="isAuthenticated()">
                    <a class="btn btn-outline-secondary me-2" th:href="@{/user-profile}">My Profile</a>
                    <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
                </sec:authorize>
                <sec:authorize access="!isAuthenticated()">
                    <a class="btn btn-primary me-1" th:href="@{/login}">Sign In</a>
                    <a class="btn btn-secondary" th:href="@{/register}">Sign Up</a>
                </sec:authorize>
            </div>
        </div>
    </nav>
</header>
<hr>

<div class="container mt-4">
    <h2 th:text="${profileUser.username + ' рецепты'}">User Recipes</h2>
    <div class="row">
        <div class="col-md-4 mb-4" th:each="recipe : ${recipes}">
            <div class="card recipe-card h-100">
                <img th:src="${'/images/' + recipe.imageUrl}"
                     th:alt="${recipe.name}" class="card-img-top"
                     style="height:160px;object-fit:cover;"
                     onerror="this.src='/images/grey.jpg'">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${recipe.name}">Name</h5>
                    <p class="card-text flex-grow-1" th:text="${recipe.description}">Desc</p>
                    <a class="btn btn-primary btn-sm mt-2"
                       th:href="@{/recipe/{id}(id=${recipe.id})}">Let's cook</a>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(recipes)}" class="col-12">
            <p class="text-muted">This user hasn't added any recipes yet.</p>
        </div>
    </div>
</div>

<footer class="col-12 mt-5" id="footer">
    <div><h1><b>CookBook</b></h1>
        <p>Discover delicious recipes and culinary inspiration for every occasion.</p></div>
    <div class="links"><h1><b>Quick Links</b></h1>
        <ul class="navbar-nav">
            <li><a class="nav-link" th:href="@{/}">Home</a></li>
            <li><a class="nav-link" th:href="@{/about}">About us</a></li>
        </ul>
    </div>
    <div style="text-align:right;"><h1><b>Contact Us</b></h1>
        <ul class="navbar-nav">
            <li><a class="nav-link" href="#">info@cookbook.com</a></li>
        </ul>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
