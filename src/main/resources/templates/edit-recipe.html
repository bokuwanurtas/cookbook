<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/editRecipeDetails.css}">
    <title>CookBook - Edit Recipe</title>
</head>
<body>
<div class="container mt-5">
    <h2>Edit Recipe</h2>
    <div class="card p-4 shadow-sm">
        <form th:action="@{/api/recipe/edit}" method="post" id="edit-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="recipeId" th:value="${recipe.id}"/>

            <div class="mb-3">
                <label class="form-label">Recipe Name</label>
                <input type="text" class="form-control" name="recipeName"
                       th:value="${recipe.name}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="recipeDescription"
                          rows="3" th:text="${recipe.description}"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Ingredients</label>
                <textarea class="form-control" name="recipeIngredients"
                          rows="4" th:text="${recipe.ingredients}"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Instructions</label>
                <textarea class="form-control" name="recipeSteps"
                          rows="5" th:text="${recipe.steps}"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input type="text" class="form-control" name="recipeImage"
                       th:value="${recipe.imageUrl}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Save Changes</button>
                <a class="btn btn-secondary" th:href="@{/user-profile}">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/editPage.js}"></script>
</body>
</html>
